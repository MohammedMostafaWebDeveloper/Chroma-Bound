    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chroma Bound</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            #main{
                position: absolute;
                background-color: rgb(145, 145, 145);
            }
            #recolor{
                display: none;
                color: #ec3afc;
            }
        </style>
    </head>
    <body>
        <canvas id="main"></canvas>
        <canvas id="recolor"></canvas>
        <script>
            var canvas = document.querySelector("#main")
            var recolor = document.querySelector("#recolor")
            canvas.width = innerWidth
            canvas.height = innerHeight
            var c = canvas.getContext("2d")
            var ctx = recolor.getContext("2d")

            var camera = {x: canvas.width / 2, y: canvas.height / 2}
            var gravity = 3000

            var slowmo = false

            var idle = new Image()
            idle.src = "assets/Idle.png"

            var idle_dim = [10, 1]

            var colors = ["#ffda32", "#3a88fc", "#ec3afc"]
            var color_index = 0

            var idles = new Map()

            function changeColors(img, arr, color) {
                recolor.width = img.width
                recolor.height = img.height

                
                ctx.drawImage(img, 0, 0, img.width, img.height)
                var imagedata = ctx.getImageData(0, 0, img.width, img.height)
                var data = imagedata.data
                var red = parseInt(color.slice(1, 3), 16)
                var green = parseInt(color.slice(3, 5), 16)
                var blue = parseInt(color.slice(5, 7), 16)
                for (var i = 0; i < data.length; i += 4) {

                    data[i] += red
                    data[i + 1] += green
                    data[i + 2] += blue
                }

                ctx.putImageData(imagedata, 0, 0)
                arr.set(color, new Image())
                arr.get(color).src = recolor.toDataURL()

            }
            idle.onload = function () {
                colors.forEach(color => {
                    changeColors(idle, idles, color)
                })
            }
            

            function detectCollision(a, b, color1, color2) { 
                if (color1 !== color2) {
                    return false
                }
                var pos = {x: a.pos.x + a.collision_offset[0], y: a.pos.y + a.collision_offset[1]}
                var width = a.width - a.collision_offset[0] - a.collision_offset[2]
                var height = a.height - a.collision_offset[1] - a.collision_offset[3]
                return (
                    pos.x + width > b.pos.x &&
                    pos.x < b.pos.x + b.width &&
                    pos.y + height > b.pos.y &&
                    pos.y < b.pos.y + b.height
                )
            }

            class Player{
                constructor(color) {
                    this.pos = {x: 0, y: 0}
                    this.vel = {x: 0, y: 0}
                    this.width = 200
                    this.height = 200
                    this.collision_offset = [65, 30, 60, 8]
                    this.color = color
                    this.dir = [0, 0]
                    this.speed = 400
                    this.grounded = false
                    this.jumping = false
                    this.index = 0
                    this.immunePlatfoms = []
                    this.bounce = 2000
                    this.facing = 1
                    this.state = "idle"
                }
                draw() {
                    var sprite, width, height, dim
                    if (this.state == "idle") {
                        sprite = idles.get(this.color)
                        width = (sprite.width) / idle_dim[0]
                        height = (sprite.height) / idle_dim[1]
                        dim = idle_dim
                    }
                    c.save()
                    if (this.facing == 1) {
                        c.drawImage(sprite, (Math.floor(this.index) % dim[0]) * width, 0, width, height, this.pos.x, this.pos.y, this.width, this.height)
                    }
                    else {
                        c.translate(this.pos.x + this.width, this.pos.y)
                        c.scale(-1, 1)
                        c.drawImage(sprite, (Math.floor(this.index) % dim[0]) * width, 0, width, height, 0, 0, this.width, this.height)
                    }
                    c.restore()
                }
                collideX(dt) {
                    platforms.forEach(platform => {
                        if (this.immunePlatfoms.includes(platform)) {
                            return
                        }
                        if (detectCollision(this, platform, this.color, platform.color)) {
                            if (this.vel.x > 0) {
                                this.pos.x = platform.pos.x - this.width + this.collision_offset[2]
                            }
                            else if (this.vel.x < 0) {
                                this.pos.x = platform.pos.x + platform.width - this.collision_offset[0]
                            }
                            this.vel.x = 0
                        }
                    })
                }
                collideY() {
                    platforms.forEach(platform => {
                        if (this.immunePlatfoms.includes(platform)) {
                            return
                        }
                        if (detectCollision(this, platform, this.color, platform.color)) {
                            if (this.vel.y > 0) {
                                this.pos.y = platform.pos.y - this.height + this.collision_offset[3]
                                this.grounded = true
                            }
                            else if (this.vel.y < 0) {
                                this.pos.y = platform.pos.y + platform.height - this.collision_offset[1]
                            }
                            this.vel.y = 0
                            
                        }
                    })
                }
                changeColor(color) {
                    player.color = color
                    platforms.forEach(platform => {
                        if (detectCollision(this, platform, this.color, platform.color)) {
                            this.vel.y = -this.bounce
                            this.immunePlatfoms.push(platform)
                        }
                    })

                }
                update(dt) {
                    
                    this.index += 10 * dt
                    this.grounded = false
                    var target_vel = (this.dir[0] + this.dir[1]) * this.speed
                    this.vel.x += (target_vel - this.vel.x) / 3

                    this.vel.y += gravity * dt

                    this.pos.x += this.vel.x * dt
                    this.collideX()
                    this.pos.y += this.vel.y * dt
                    this.collideY()

                    this.immunePlatfoms.forEach(platform => {
                        if (!detectCollision(this, platform, platform.color, platform.color)) {
                            this.immunePlatfoms.splice(this.immunePlatfoms.indexOf(platform))
                        }
                    })
                    
                    if (this.jumping && this.grounded) {
                        this.vel.y = -Math.sqrt(2 * gravity * 250)
                    }
                    
                    if (this.dir[0] + this.dir[1] == 1 && this.facing == -1) {
                        var temp = this.collision_offset[0]
                        this.collision_offset[0] = this.collision_offset[2]
                        this.collision_offset[2] = temp
                        this.facing = 1
                    }
                    else if (this.dir[0] + this.dir[1] == -1 && this.facing == 1) {
                        var temp = this.collision_offset[0]
                        this.collision_offset[0] = this.collision_offset[2]
                        this.collision_offset[2] = temp
                        this.facing = -1
                    }


                    this.draw()
                }
            }

            class Platform{
                constructor(x, y, width, height, color) {
                    this.pos = {x: x, y: y}
                    this.width = width
                    this.height = height
                    this.color = color
                }
                draw() {
                    c.fillStyle = this.color
                    c.fillRect(this.pos.x, this.pos.y, this.width, this.height)
                }
            }

            var player = new Player(colors[color_index])

            var platforms = []
            platforms.push(new Platform(-50, 250, 200, 30, colors[0]))
            platforms.push(new Platform(100, 150, 200, 30, colors[1]))
            platforms.push(new Platform(-250, 150, 200, 30, colors[2]))

            window.onkeydown = function (e) {
                if (e.keyCode == 37) {
                    player.dir[0] = -1
                }
                else if (e.keyCode == 39) {
                    player.dir[1] = 1
                }
                else if (e.keyCode == 38) {
                    player.jumping = true
                }
            }
            window.onkeyup = function (e) {
                if (e.keyCode == 37) {
                    player.dir[0] = 0
                }
                else if (e.keyCode == 39) {
                    player.dir[1] = 0
                }
                else if (e.keyCode == 38) {
                    player.jumping = false
                }
            }

            window.onmousedown = function () {
                slowmo = true
            }
            window.onmouseup = function () {
                slowmo = false
                color_index ++
                if (color_index >= colors.length) {
                    color_index = 0
                }
                player.changeColor(colors[color_index])
            }

            var t0 = 0

            function animate(t) {
                var dt = (t - t0) / 1000
                t0 = t
                if (isNaN(dt) || dt > 0.1) {
                    dt = 0
                }
                if (slowmo) {
                    dt *= 0.2
                }
                requestAnimationFrame(animate)
                c.setTransform(1, 0, 0, 1, 0, 0)
                c.clearRect(0, 0, canvas.width, canvas.height)
                c.translate(camera.x, camera.y)

                platforms.forEach(platform => {
                    platform.draw()
                })
                
                player.update(dt)
                camera.x += (canvas.width / 2 - (player.pos.x + player.width / 2) - camera.x) * 0.1
                camera.y += (canvas.height / 2 - (player.pos.y + player.height / 2) - camera.y) * 0.1
            }
            animate()
        </script>
    </body>
    </html>
